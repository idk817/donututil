<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tracking Test Site</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; line-height: 1.6; }
        .box { background: #f4f4f4; padding: 15px; border-radius: 5px; border-left: 5px solid #007bff; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Welcome to My Website</h1>
    <p>This is a live test page hosted on GitHub Pages.</p>

    <div class="box">
        <h3>Your Connection Data (Loaded via API):</h3>
        <p><strong>IP Address:</strong> <span id="ip-address">Loading...</span></p>
        <p><strong>Location:</strong> <span id="location">Loading...</span></p>
        <p><strong>Internet Provider:</strong> <span id="isp">Loading...</span></p>
    </div>

    <script>
    // Step 1: Fetch the raw plain text from the exact link you provided
    fetch('https://api.ipify.org/')
        .then(response => {
            if (!response.ok) {
                throw new Error('Failed to reach ipify plain text service');
            }
            // Use .text() because the response contains no JSON markup
            return response.text(); 
        })
        .then(rawIpText => {
            // Trim any accidental hidden spacing around the IP string
            const cleanIp = rawIpText.trim();
            console.log("Step 1 Success! Captured Raw IP String:", cleanIp);

            // Step 2: Feed that precise clean text string into the ipapi URL pathway
            // FIXED: Cleaned up the protocol, added the missing '$' and the forward slash
            return fetch(`https://ipapi.co/${cleanIp}/json/`);
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('ipapi registry rejected the request: ' + response.status);
            }
            return response.json();
        })
        .then(data => {
            // Step 3: Populate your box fields using the validated data payload
            document.getElementById('ip-address').innerText = data.ip || "Not found";
            
            const city = data.city || "";
            const region = data.region || "";
            const country = data.country_name || "";
            document.getElementById('location').innerText = `${city}, ${region}, ${country}` || "Not found";
            
            document.getElementById('isp').innerText = data.org || "Not found";
            
            console.log("Step 2 Success! Full Location Payload:", data);
        })
        .catch(error => {
            console.error('Data chain error:', error);
            document.getElementById('ip-address').innerText = "Data fetch failed";
        });
</script>

</body>
</html>
